<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELULU - Premium Email Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-deep: #532159;
            --rose-gold: #DDA7A5;
            --bg-light: #FDF6F7;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; color: #333; }
        
        /* Panel điều khiển */
        .input-panel { width: 380px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(83, 33, 89, 0.1); overflow-y: auto; border: 1px solid rgba(221, 167, 165, 0.3); }
        .logo-brand { width: 180px; display: block; margin: 0 auto 20px; }
        h3 { text-align: center; color: var(--purple-deep); letter-spacing: 2px; font-size: 16px; margin-bottom: 25px; text-transform: uppercase; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 12px; color: var(--purple-deep); text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--rose-gold); outline: none; box-shadow: 0 0 8px rgba(221, 167, 165, 0.4); }
        
        button { width: 100%; padding: 15px; background: var(--purple-deep); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 25px; transition: 0.3s; box-shadow: 0 5px 15px rgba(83, 33, 89, 0.3); }
        button:hover { background: #3d1842; transform: translateY(-2px); }

        /* Panel Preview */
        .preview-panel { flex-grow: 1; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px dashed var(--rose-gold); }
        #email-render-area { flex-grow: 1; overflow-y: auto; padding: 10px; background: #fff; }
        .hint { font-size: 12px; color: #888; text-align: center; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="input-panel">
        <img src="https://i.ibb.co/bjKTPzwC/00aff6b47cfb.png" alt="DELULU Logo" class="logo-brand">
        <h3>Premium Generator</h3>
        
        <label>Tên khách hàng:</label>
        <input type="text" id="custName" placeholder="Ví dụ: Anh Hoàng / Chị Ngọc">
        
        <label>Link eCard của khách:</label>
        <input type="text" id="cardUrl" placeholder="https://delulujsc.github.io/eCard-Ngoc/">

        <label>Link QR Code (Tùy chọn):</label>
        <input type="text" id="qrUrl" placeholder="Bỏ trống để tự tạo QR từ Link">
        
        <button onclick="generateEmail()">RENDER LUXURY EMAIL</button>

        <div class="hint">
            Sau khi Render, hãy bôi đen vùng Preview bên phải và Paste trực tiếp vào Gmail của khách.
        </div>
    </div>

    <div class="preview-panel">
        <div id="email-render-area">
            <p style="text-align: center; color: #bbb; margin-top: 100px;">Đang đợi dữ liệu cấu hình...</p>
        </div>
    </div>

    <script>
        function generateEmail() {
            const name = document.getElementById('custName').value || "Quý khách hàng";
            const cardUrl = document.getElementById('cardUrl').value || "#";
            const qrUrl = document.getElementById('qrUrl').value || "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(cardUrl);

            const emailContent = `
                <div style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #FDF6F7; padding: 40px 10px;">
                    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(83,33,89,0.1); border: 1px solid #eee;">
                        <tr>
                            <td align="center" style="padding: 40px 0 20px 0; background-color: #532159;">
                                <img src="https://i.ibb.co/bjKTPzwC/00aff6b47cfb.png" width="180" alt="DELULU" style="display: block; filter: brightness(0) invert(1);">
                            </td>
                        </tr>
                        
                        <tr>
                            <td style="padding: 40px 30px;">
                                <h1 style="color: #532159; font-size: 22px; margin: 0 0 20px 0; text-align: center;">BÀN GIAO DANH THIẾP ĐIỆN TỬ</h1>
                                <p style="font-size: 16px; color: #555;">Xin chào <strong>${name}</strong>,</p>
                                <p style="font-size: 15px; color: #555; line-height: 1.6;"><strong>DELULU Corp</strong> trân trọng gửi tới Anh/Chị sản phẩm <strong>eCard Thông Minh</strong>. Đây là bước đột phá giúp Anh/Chị kết nối chuyên nghiệp hơn trong kỷ nguyên số.</p>
                                
                                <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="margin: 30px 0; background-color: #FDF6F7; border-radius: 20px; border: 1px dashed #DDA7A5;">
                                    <tr>
                                        <td align="center" style="padding: 30px;">
                                            <p style="margin: 0 0 15px 0; font-size: 13px; color: #532159; font-weight: bold; letter-spacing: 1px;">MÃ QR CỦA ANH/CHỊ</p>
                                            <img src="${qrUrl}" width="180" height="180" style="border: 8px solid #ffffff; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                                            <br><br>
                                            <a href="${cardUrl}" style="display: inline-block; padding: 15px 35px; background-color: #532159; color: #ffffff !important; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 15px;">TRẢI NGHIỆM NGAY</a>
                                        </td>
                                    </tr>
                                </table>

                                <p style="font-weight: bold; color: #532159; border-left: 4px solid #DDA7A5; padding-left: 10px;">✨ Đặc quyền của Anh/Chị:</p>
                                <ul style="font-size: 14px; color: #666; padding-left: 20px; line-height: 1.8;">
                                    <li>Lưu icon eCard trực tiếp ra màn hình chính điện thoại (PWA).</li>
                                    <li>Đồng bộ thông tin vào danh bạ đối tác chỉ với 1 chạm.</li>
                                    <li>Cập nhật thông tin linh hoạt, không cần in lại thẻ giấy.</li>
                                </ul>

                                <div style="background-color: #FFF5F5; border-radius: 15px; padding: 20px; margin-top: 35px; font-size: 13.5px; color: #444; line-height: 1.6; border: 1px solid #ffebeb;">
                                    Quý khách khi có nhu cầu <strong>cập nhật thông tin</strong> (lên chức, đổi số...) hoặc mở rộng thêm các trang <strong>Portfolio/Dịch vụ</strong> chuyên sâu, vui lòng phản hồi email này để đội ngũ tư vấn DELULU hỗ trợ báo giá ưu đãi nhất.
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td align="center" style="padding: 30px; background-color: #f9f9f9; color: #999; font-size: 11px; border-top: 1px solid #eee;">
                                <strong>DELULU JOINT STOCK COMPANY</strong><br>
                                Nền tảng pháp lý số & Giải pháp thương hiệu 4.0<br>
                                © 2026 Bản quyền thuộc về Ngọc Prinny.
                            </td>
                        </tr>
                    </table>
                </div>
            `;
            document.getElementById('email-render-area').innerHTML = emailContent;
        }
    </script>
</body>
</html>
